name: ci

on:
  pull_request:
  push:
    branches: [main, master]

jobs:
  backend-quality:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]

      - name: Lint backend
        run: ruff check .

      - name: Test backend
        run: pytest

  frontend-quality:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package.json

      - name: Install frontend dependencies
        run: npm install

      - name: Type check
        run: npm run type-check

      - name: Build frontend
        run: npm run build

  latency-benchmark:
    runs-on: ubuntu-latest
    needs: [backend-quality]
    services:
      redis:
        image: redis:7.2-alpine
        ports:
          - 6379:6379
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]

      - name: Start backend API
        run: |
          nohup uvicorn app.main:app --host 0.0.0.0 --port 8000 --app-dir . > /tmp/backend.log 2>&1 &
          sleep 3

      - name: Run latency probe
        run: |
          python scripts/latency_e2e_probe.py --sample-size 120 --assert-p95-ms 300 --output reports/latency/latest.json
          python scripts/latency_trend_report.py

      - name: Upload latency artifacts
        uses: actions/upload-artifact@v4
        with:
          name: latency-reports
          path: backend/reports/latency/
