apiVersion: apps/v1
kind: Deployment
metadata:
  name: crypto-backend
  labels:
    app: crypto-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: crypto-backend
  template:
    metadata:
      labels:
        app: crypto-backend
    spec:
      containers:
        - name: backend
          image: ghcr.io/example/crypto-predict-backend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 5556
          env:
            - name: CP_REDIS_URL
              value: redis://redis:6379/0
            - name: CP_POSTGRES_DSN
              valueFrom:
                secretKeyRef:
                  name: crypto-backend-secrets
                  key: postgres_dsn
            - name: CP_LOG_LEVEL
              value: INFO
          resources:
            requests:
              cpu: "250m"
              memory: "384Mi"
            limits:
              cpu: "1000m"
              memory: "768Mi"
          readinessProbe:
            httpGet:
              path: /readyz
              port: 5556
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /healthz
              port: 5556
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 2
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /healthz
              port: 5556
            failureThreshold: 20
            periodSeconds: 3
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 10001
            capabilities:
              drop: ["ALL"]
---
apiVersion: v1
kind: Service
metadata:
  name: crypto-backend
  labels:
    app: crypto-backend
spec:
  selector:
    app: crypto-backend
  ports:
    - name: http
      protocol: TCP
      port: 5556
      targetPort: 5556
